{% extends "base.html" %}

{% block title %}Design Studio - Gruha Alankara{% endblock %}

{% block content %}
<div class="design-studio">
    <h2>Design Studio</h2>
    <p>Create your perfect interior design.</p>

    <form method="POST" action="{{ url_for('design') }}" enctype="multipart/form-data" class="design-form">
        <div class="form-group">
            <label for="room_type">Room Type</label>
            <select id="room_type" name="room_type" class="form-control">
                <option value="living_room">Living Room</option>
                <option value="bedroom">Bedroom</option>
                <option value="kitchen">Kitchen</option>
                <option value="bathroom">Bathroom</option>
                <option value="dining_room">Dining Room</option>
                <option value="office">Office</option>
            </select>
        </div>

        <div class="form-group">
            <label for="style">Design Style</label>
            <select id="style" name="style" class="form-control">
                <option value="modern">Modern</option>
                <option value="traditional">Traditional</option>
                <option value="minimalist">Minimalist</option>
                <option value="bohemian">Bohemian</option>
                <option value="industrial">Industrial</option>
                <option value="scandinavian">Scandinavian</option>
            </select>
        </div>

        <div class="form-group">
            <label for="budget">Budget ($)</label>
            <input type="number" id="budget" name="budget" class="form-control" placeholder="Enter your budget" min="0">
        </div>

        <div class="form-group">
            <label for="room_image">Upload Room Image (optional)</label>
            <input type="file" id="room_image" name="room_image" class="form-control" accept="image/*">
        </div>

        <button type="submit" class="btn btn-primary">Generate Design</button>
    </form>
</div>
{% endblock %}
